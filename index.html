<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הורדת שמע | Pro</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%230d9488' stroke-width='2'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' d='M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3' /%3e%3c/svg%3e">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                        }
                    },
                    fontFamily: {
                        sans: ['Rubik', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05), 0 0 20px rgba(20, 184, 166, 0.05);
        }
        .input-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-transition:focus-within { transform: translateY(-2px); }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 text-slate-800">

    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-24 opacity-0 transition-all duration-500 ease-out z-50 pointer-events-none">
        <div class="bg-primary-600 text-white px-5 py-3 rounded-2xl shadow-xl shadow-primary-600/20 flex items-center gap-3 border border-primary-500/50 backdrop-blur-md">
            <div class="bg-white/20 p-1.5 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <span id="toastMessage" class="font-medium text-sm sm:text-base">הודעת מערכת</span>
        </div>
    </div>

    <div class="glass-panel rounded-3xl max-w-lg w-full p-8 sm:p-10 relative overflow-hidden">
        <div class="absolute top-0 right-0 left-0 h-1.5 bg-gradient-to-r from-primary-400 via-primary-600 to-primary-700"></div>

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-50 text-primary-600 mb-4 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-2">מערכת הורדת שמע</h1>
            <p class="text-primary-600 font-medium">המרת סרטוני יוטיוב לאודיו באיכות גבוהה</p>
        </div>

        <div class="bg-primary-50 border border-primary-100 rounded-2xl p-5 mb-8">
            <div class="flex items-start gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-primary-600 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <div class="text-sm text-primary-700 leading-relaxed">
                    <p class="font-semibold text-primary-800">שימו לב לזמני ההמתנה:</p>
                    <p class="opacity-90 mt-1">משך העיבוד תלוי באורך הסרטון. קבצים ארוכים (מעל שעה) עשויים לקחת דקה-שתיים עד לתחילת ההורדה. המערכת תודיע כשהקובץ מוכן.</p>
                </div>
            </div>
        </div>

        <form id="downloadForm" class="space-y-6">
            <div class="input-transition group">
                <label for="urlInput" class="block text-sm font-medium text-slate-600 mb-1.5 ml-1 transition-colors group-focus-within:text-primary-600">קישור לסרטון <span class="text-rose-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400 group-focus-within:text-primary-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244" />
                        </svg>
                    </div>
                    <input type="url" id="urlInput" required placeholder="https://www.youtube.com/watch?v=..." 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl pr-11 pl-4 py-3.5 text-slate-800 focus:bg-white focus:outline-none focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all shadow-sm text-left disabled:opacity-50 disabled:cursor-not-allowed" dir="ltr">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-base font-semibold rounded-xl text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all duration-300 shadow-lg hover:shadow-primary-500/30 overflow-hidden mt-8 disabled:opacity-80 disabled:cursor-not-allowed">
                <div class="absolute inset-0 w-full h-full -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
                <span class="flex items-center gap-2 relative z-10" id="btnContent">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-transform group-hover:-translate-y-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    התחל הורדה
                </span>
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('downloadForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnContent = document.getElementById('btnContent');
        const urlInput = document.getElementById('urlInput');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        let toastTimeout;

        function showToast(message, duration = 5000) {
            toastMessage.textContent = message;
            toast.classList.remove('-translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            clearTimeout(toastTimeout);
            
            if (duration > 0) {
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('-translate-y-24', 'opacity-0');
                }, duration);
            }
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const urlValue = urlInput.value;
            const originalBtnContent = btnContent.innerHTML;
            
            // נעילת הממשק לעיבוד
            urlInput.disabled = true;
            submitBtn.disabled = true;
            
            // חיווי טעינה
            btnContent.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>מעבד... נא להמתין בסבלנות`;
            showToast("התהליך החל. אנא המתן עד לקבלת הודעת סיום (אל תסגור את החלון).", 0); // ללא השהיית הסתרה
            
            const webhookUrl = `https://n8n.srv1256019.hstgr.cloud/webhook/31876b0c-e6c9-4f2b-b4df-fe2313428462?url=${encodeURIComponent(urlValue)}`;

            try {
                const response = await fetch(webhookUrl);
                
                if (!response.ok) throw new Error('שגיאת שרת או CORS');
                
                const blob = await response.blob();
                
                // חילוץ שם הקובץ מכותרות ה-Webhook
                let fileName = "audio_file.mp3";
                const disposition = response.headers.get('Content-Disposition');
                if (disposition && disposition.includes('filename*=')) {
                    fileName = decodeURIComponent(disposition.split("UTF-8''")[1]);
                }

                // הפעלת הורדת הקובץ למחשב
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = downloadUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                
                // ניקוי
                window.URL.revokeObjectURL(downloadUrl);
                document.body.removeChild(a);
                
                showToast("הקובץ ירד בהצלחה ונשמר במחשב!", 5000);
                urlInput.value = ''; // איפוס השדה לסרטון הבא

            } catch (error) {
                console.error("שגיאה:", error);
                showToast("אירעה שגיאה. ודא שהגדרת CORS בצומת ה-Webhook ב-n8n.", 6000);
            } finally {
                // שחרור הממשק לפעולה הבאה
                urlInput.disabled = false;
                submitBtn.disabled = false;
                btnContent.innerHTML = originalBtnContent;
            }
        });
    </script>
</body>
</html>
